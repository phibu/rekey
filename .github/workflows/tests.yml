name: Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  tests:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/PassReset.Web/ClientApp/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore src/PassReset.sln

      - name: Backend tests with coverage (coverlet.msbuild)
        run: dotnet test src/PassReset.sln --configuration Release --no-restore -p:CollectCoverage=true

      - name: Install npm dependencies
        working-directory: src/PassReset.Web/ClientApp
        run: npm ci

      - name: Frontend tests with coverage
        working-directory: src/PassReset.Web/ClientApp
        run: npm run test:coverage

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: src/PassReset.Tests/TestResults/coverage.cobertura.xml
          retention-days: 30

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: src/PassReset.Web/ClientApp/coverage/
          retention-days: 30

  security-audit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/PassReset.Web/ClientApp/package-lock.json

      - name: Install npm dependencies
        working-directory: src/PassReset.Web/ClientApp
        run: npm ci

      - name: Restore NuGet packages
        run: dotnet restore src/PassReset.sln

      - name: npm audit (high+critical gate)
        working-directory: src/PassReset.Web/ClientApp
        shell: pwsh
        run: |
          $raw    = (npm audit --json 2>&1 | Out-String)
          $result = $raw | ConvertFrom-Json
          $allowPath = "${{ github.workspace }}/deploy/security-allowlist.json"
          $allowlist = (Get-Content $allowPath -Raw | ConvertFrom-Json).advisories
          $today     = [datetime]::UtcNow.ToString("yyyy-MM-dd")
          $validIds  = $allowlist |
                       Where-Object { $_.scope -eq 'npm' -and $_.expires -gt $today } |
                       Select-Object -ExpandProperty id
          $unfixed = @()
          if ($result.vulnerabilities) {
              $result.vulnerabilities.PSObject.Properties.Value |
                  Where-Object { $_.severity -in @('high','critical') } |
                  ForEach-Object {
                      $advisoryIds = @()
                      foreach ($v in $_.via) {
                          if ($v -is [psobject] -and $v.url) {
                              $advisoryIds += ($v.url -replace '.*/','')
                          }
                      }
                      $unsuppressed = $advisoryIds | Where-Object { $_ -notin $validIds }
                      if ($unsuppressed.Count -gt 0 -or $advisoryIds.Count -eq 0) {
                          $unfixed += $_
                      }
                  }
          }
          $moderate = 0
          if ($result.metadata.vulnerabilities) {
              $moderate = [int]$result.metadata.vulnerabilities.moderate + [int]$result.metadata.vulnerabilities.low
          }
          if ($moderate -gt 0) { Write-Warning "npm audit: $moderate moderate/low advisories (not gated)" }
          if ($unfixed.Count -gt 0) {
              $unfixed | ForEach-Object { Write-Warning "Unfixed: $($_.name) [$($_.severity)]" }
              Write-Error "npm audit: unfixed high/critical advisories found (STAB-020 gate)"
              exit 1
          }
          Write-Host "npm audit: no unfixed high/critical advisories"

      - name: dotnet audit (High+Critical gate)
        shell: pwsh
        run: |
          $output = (dotnet list src/PassReset.sln package --vulnerable --include-transitive 2>&1) | Out-String
          $allowPath = "${{ github.workspace }}/deploy/security-allowlist.json"
          $allowlist = (Get-Content $allowPath -Raw | ConvertFrom-Json).advisories
          $today     = [datetime]::UtcNow.ToString("yyyy-MM-dd")
          $validIds  = $allowlist |
                       Where-Object { $_.scope -eq 'nuget' -and $_.expires -gt $today } |
                       Select-Object -ExpandProperty id
          $lines     = $output -split "`r?`n"
          $highLines = $lines | Where-Object { $_ -match '(?i)\b(High|Critical)\b' }
          $modLines  = $lines | Where-Object { $_ -match '(?i)\b(Moderate|Low)\b' -and $_ -notmatch '(?i)\b(High|Critical)\b' }
          if ($modLines) {
              $modLines | ForEach-Object { Write-Warning $_ }
          }
          $unfixed = @()
          foreach ($line in $highLines) {
              $match = [regex]::Match($line, 'GHSA-[a-z0-9\-]+')
              $id    = if ($match.Success) { $match.Value } else { $null }
              if (-not $id -or $id -notin $validIds) {
                  $unfixed += $line
              }
          }
          if ($unfixed.Count -gt 0) {
              $unfixed | ForEach-Object { Write-Warning $_ }
              Write-Error "dotnet audit: unfixed High/Critical advisories found (STAB-020 gate)"
              exit 1
          }
          Write-Host "dotnet audit: no unfixed High/Critical advisories"

      - name: Post audit summary
        if: always()
        shell: pwsh
        run: |
          "## Security Audit Results" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Scanned: npm (Node 22 / npm 10+) + dotnet NuGet packages" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Gate: high + critical only; moderate/low printed as warnings" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Allowlist: deploy/security-allowlist.json (entries expire <=90 days)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

  # Phase 11 Task 20: LDAP integration smoke test against a real Samba AD DC.
  # Warning-only (continue-on-error: true) until stable. Runs on Linux because the
  # integration project targets plain net10.0 and Samba ships a Linux container.
  # Requires repo secrets: SAMBA_DOMAIN_PASSWORD, SAMBA_TEST_OLD_PASSWORD, SAMBA_TEST_NEW_PASSWORD.
  integration-tests-ldap:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      # nowsci/samba-domain is a drop-in replacement for the retired diginc/samba-ad-dc:
      # identical DOMAIN/DOMAINPASS/DNSFORWARDER env vars, real AD DC mode with LDAPS on 636,
      # auto-rebuilt monthly. Runner-up if this disappears: instantlinux/samba-dc (needs env var
      # rename to REALM/NETBIOS_NAME and network_mode:host — more rewriting).
      samba-dc:
        image: nowsci/samba-domain:latest
        ports:
          - 389:389
          - 636:636
        env:
          # nowsci expects DOMAIN to be a dotted FQDN realm (NOT a short NetBIOS name —
          # samba-tool refuses realm==netbios). Must match the BaseDn components our
          # integration test config uses (DC=samdom,DC=example,DC=com).
          DOMAIN: SAMDOM.EXAMPLE.COM
          DOMAINPASS: ${{ secrets.SAMBA_DOMAIN_PASSWORD }}
          DNSFORWARDER: 8.8.8.8
          # Phase 11 smoke-test ergonomics: strip AD's default complexity + min-pwd-age
          # so short seeded passwords (OldPass1!/NewPass1!) aren't rejected.
          NOCOMPLEXITY: "true"
          # Self-signed cert isn't in the runner's trust store; INSECURELDAP lets the
          # container accept plain LDAP on 389 so the test client doesn't need cert work.
          INSECURELDAP: "true"
        # SYS_ADMIN + NET_ADMIN: nowsci's first-boot samba_provision needs elevated perms.
        # health-retries bumped to 20 because nowsci's first-run provisioning takes ~30-60s
        # (vs diginc's ~10s).
        options: >-
          --cap-add SYS_ADMIN
          --cap-add NET_ADMIN
          --health-cmd "pidof samba"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    env:
      PASSRESET_INTEGRATION_LDAP: "1"
      PASSRESET_PasswordChangeOptions__ServiceAccountPassword: ${{ secrets.SAMBA_DOMAIN_PASSWORD }}
      # Override JSON config to match what the nowsci container exposes with INSECURELDAP=true
      # (plain LDAP on 389 — no cert-trust dance in CI).
      PASSRESET_PasswordChangeOptions__LdapPort: "389"
      PASSRESET_PasswordChangeOptions__LdapUseSsl: "false"
      # Array-binding pattern: indexed key per element.
      PASSRESET_PasswordChangeOptions__LdapHostnames__0: "localhost"
      PASSRESET_PasswordChangeOptions__BaseDn: "DC=samdom,DC=example,DC=com"
      PASSRESET_PasswordChangeOptions__ServiceAccountDn: "CN=Administrator,CN=Users,DC=samdom,DC=example,DC=com"
      PASSRESET_PasswordChangeOptions__AllowedUsernameAttributes__0: "samaccountname"
      PASSRESET_TEST_USERNAME: "testuser"
      PASSRESET_TEST_OLD_PASSWORD: ${{ secrets.SAMBA_TEST_OLD_PASSWORD }}
      PASSRESET_TEST_NEW_PASSWORD: ${{ secrets.SAMBA_TEST_NEW_PASSWORD }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Wait for Samba DC LDAP port
        run: |
          for i in {1..30}; do
            nc -z localhost 389 && break
            sleep 2
          done

      - name: Verify secret lengths (lengths are not sensitive)
        env:
          DOMAINPASS_LEN: ${{ secrets.SAMBA_DOMAIN_PASSWORD }}
          TESTOLD_LEN: ${{ secrets.SAMBA_TEST_OLD_PASSWORD }}
          TESTNEW_LEN: ${{ secrets.SAMBA_TEST_NEW_PASSWORD }}
        run: |
          echo "SAMBA_DOMAIN_PASSWORD length: ${#DOMAINPASS_LEN}"
          echo "SAMBA_TEST_OLD_PASSWORD length: ${#TESTOLD_LEN}"
          echo "SAMBA_TEST_NEW_PASSWORD length: ${#TESTNEW_LEN}"
          if [ -z "$TESTOLD_LEN" ]; then echo "::error::SAMBA_TEST_OLD_PASSWORD is empty"; exit 1; fi
          if [ -z "$TESTNEW_LEN" ]; then echo "::error::SAMBA_TEST_NEW_PASSWORD is empty"; exit 1; fi
          if [ -z "$DOMAINPASS_LEN" ]; then echo "::error::SAMBA_DOMAIN_PASSWORD is empty"; exit 1; fi

      - name: Seed test user
        env:
          TEST_OLD: ${{ secrets.SAMBA_TEST_OLD_PASSWORD }}
        run: |
          # samba-tool user create uses positional <username> <password> args.
          # The --newpassword flag is for 'user setpassword', not 'user create'.
          docker exec ${{ job.services.samba-dc.id }} samba-tool user create \
            testuser \
            "$TEST_OLD" \
            --given-name=Test \
            --surname=User

      - name: Run LDAP integration tests
        working-directory: src/PassReset.Tests.Integration.Ldap
        run: dotnet test -c Release --logger "console;verbosity=detailed"
